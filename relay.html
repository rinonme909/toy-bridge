<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>toy relay</title>
<style>
body{font-family:system-ui;background:#111;color:#eee;padding:20px;text-align:center}
button{font-size:18px;padding:12px 28px;margin:10px;border:none;border-radius:8px;cursor:pointer}
#btn-connect{background:#4a9eff;color:#fff}
#btn-stop{background:#ff4a4a;color:#fff}
#btn-test{background:#ffaa00;color:#000}
#log{margin:20px 0;font-size:13px;text-align:left;background:#1a1a1a;padding:12px;border-radius:8px;max-height:320px;overflow-y:auto}
input{font-size:16px;padding:8px;width:80%;border-radius:6px;border:1px solid #555;background:#222;color:#eee;margin:6px 0}
label{font-size:14px;color:#999}
.ok{color:#4caf50}.err{color:#ff4a4a}.warn{color:#ffaa00}
</style></head><body>
<h2>toy relay</h2>
<div>
<label>中继地址</label><br>
<input id="url" value="https://toy-bridge-production-0be0.up.railway.app/toy-next">
</div>
<br>
<button id="btn-connect" onclick="start()">连接玩具</button>
<button id="btn-test" onclick="testBuzz()">本地测试震动</button>
<button id="btn-stop" onclick="sendStop()">紧急停止</button>
<div id="log">等待连接...</div>

<script>
let char=null, alive=null, lastCmd=null, polling=null;

function log(s,cls){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className=cls||'';
  d.textContent=new Date().toLocaleTimeString()+' '+s;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

async function start(){
  document.getElementById('log').innerHTML='';
  try{
    log('正在扫描...');
    const dev=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[0xFFE0,0xFFE5,0x1800,0x1801]
    });
    log('选中: '+dev.name,'ok');

    log('连接 GATT...');
    const server=await dev.gatt.connect();
    log('GATT 已连接','ok');

    // 扫描所有服务
    log('扫描服务...');
    let svc=null;
    const tryUUIDs=[0xFFE0,0xFFE5];
    for(const u of tryUUIDs){
      try{
        svc=await server.getPrimaryService(u);
        log('找到服务: 0x'+u.toString(16).toUpperCase(),'ok');
        break;
      }catch(e){
        log('0x'+u.toString(16).toUpperCase()+' 不存在','warn');
      }
    }

    if(!svc){
      log('尝试获取全部服务...','warn');
      try{
        const all=await server.getPrimaryServices();
        for(const s of all) log('发现: '+s.uuid);
        if(all.length) svc=all[0];
      }catch(e){ log('获取服务失败: '+e.message,'err'); }
    }

    if(!svc){ log('无可用服务','err'); return; }

    // 扫描特征值
    log('扫描特征值...');
    char=null;
    try{
      const chars=await svc.getCharacteristics();
      for(const c of chars){
        const p=c.properties;
        log('特征: '+c.uuid+' W:'+p.write+' WNR:'+p.writeWithoutResponse);
        if(p.writeWithoutResponse||p.write) char=c;
      }
    }catch(e){ log('获取特征值失败: '+e.message,'err'); }

    if(!char){
      try{
        char=await svc.getCharacteristic(0xFFE1);
        log('回退到 0xFFE1','ok');
      }catch(e){ log('0xFFE1 也不存在','err'); return; }
    }

    log('连接完成，可以控制了','ok');

    dev.addEventListener('gattserverdisconnected',()=>{
      log('蓝牙断开','err');
      clearInterval(alive); clearInterval(polling); char=null;
    });

    startPolling();
    startKeepalive();
    try{await navigator.wakeLock.request('screen');log('屏幕保持唤醒','ok');}catch(e){}
  }catch(e){ log('失败: '+e.message,'err'); }
}

async function testBuzz(){
  if(!char){log('先连蓝牙','err');return;}
  log('本地测试：发送震动...');
  const cmd=new Uint8Array([0x55,0x04,0x00,0x00,0x01,0x40,0xAA]);
  try{
    await writeCmd(cmd);
    log('指令已发送，2秒后停止','ok');
    setTimeout(()=>sendStop(),2000);
  }catch(e){log('发送失败: '+e.message,'err');}
}

function startPolling(){
  const url=document.getElementById('url').value;
  log('开始轮询服务器','ok');
  polling=setInterval(async()=>{
    try{
      const r=await fetch(url);
      const d=await r.json();
      if(!d||!Object.keys(d).length) return;
      log('收到: '+JSON.stringify(d));
      if(d.stop){sendStop();return;}
      if(d.speed!==undefined){
        const v=Math.round(d.speed*255);
        const cmd=new Uint8Array([0x55,0x04,0x00,0x00,0x01,v,0xAA]);
        lastCmd=cmd;
        await writeCmd(cmd);
        log('强度 '+Math.round(d.speed*100)+'%','ok');
        if(d.sec) setTimeout(()=>sendStop(),d.sec*1000);
      }
      if(d.pattern!==undefined){
        const lv=Math.round((d.level||0.5)*5);
        const cmd=new Uint8Array([0x55,0x03,0x00,0x00,d.pattern,lv,0x00]);
        lastCmd=cmd;
        await writeCmd(cmd);
        log('花样 '+d.pattern+' 强度 '+lv,'ok');
      }
    }catch(e){}
  },500);
}

function startKeepalive(){
  alive=setInterval(async()=>{
    if(lastCmd&&char){try{await writeCmd(lastCmd);}catch(e){}}
  },1500);
}

async function writeCmd(cmd){
  if(!char) return;
  if(char.properties.writeWithoutResponse) await char.writeValueWithoutResponse(cmd);
  else await char.writeValue(cmd);
}

async function sendStop(){
  lastCmd=null;
  if(char){try{await writeCmd(new Uint8Array([0x55,0x04,0x00,0x00,0x00,0x00,0xAA]));}catch(e){}}
  log('已停止','warn');
}
</script></body></html>
